# JamShield -> HiveMQ Cloud bridge (outbound TLS, no inbound ports on the Pi).
# Deployed by: .\deploy_iot.ps1 -Cloud
#
# >>> FILL IN your HiveMQ cluster host on the `address` line below. <<<
#     Find it in HiveMQ Cloud console -> your cluster -> Connection settings
#     (e.g. a1b2c3d4e5.s1.eu.hivemq.cloud). Keep port 8883.

connection hivemq-cloud
address 6399bf19417f4ba696640092918aa92f.s1.eu.hivemq.cloud:8883

bridge_protocol_version mqttv311
# try_private false is REQUIRED for non-Mosquitto brokers (HiveMQ/AWS/etc.):
# the default Mosquitto bridge handshake makes them drop the connection.
try_private false
remote_username Lokip
remote_password Loki2536

bridge_cafile /etc/ssl/certs/ca-certificates.crt
bridge_insecure false

topic jamshield/feed             out 1 "" ""
topic jamshield/sensor/ldr       out 1 "" ""
topic jamshield/events/failover  out 1 "" ""
topic jamshield/control          in  1 "" ""

cleansession true
notifications false
restart_timeout 5 30

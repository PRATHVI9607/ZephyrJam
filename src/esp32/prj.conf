# JamShield — Zephyr Kconfig (PRD.md Appendix A, tuned for a clean v3.6 build).
# Some symbol names/sizes differ from the PRD draft to match real Zephyr 3.6.0
# on esp32_devkitc_wroom; see comments where adjusted.

# ---- Kernel ---------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_THREAD_NAME=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_INIT_STACKS=y

# Stack overflow detection (CLAUDE.md critical rule 7)
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_LOG=y

# ---- Networking -----------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DHCPV4=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y

# Buffers (WiFi needs a healthy pool)
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_MAX_CONTEXTS=6

# ---- WiFi -----------------------------------------------------------------
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

# ---- Connectivity Manager (L4 connect/disconnect events) ------------------
CONFIG_NET_CONNECTION_MANAGER=y

# ---- MQTT -----------------------------------------------------------------
CONFIG_MQTT_LIB=y
CONFIG_MQTT_KEEPALIVE=60

# ---- Bluetooth (BLE peripheral) ------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="JamShield"
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_SMP=n
CONFIG_BT_PRIVACY=n

# ---- ADC (LDR) ------------------------------------------------------------
CONFIG_ADC=y

# ---- Crypto (WiFi WPA2 supplicant pulls this in) --------------------------
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=10000

# ---- Timing / scheduling --------------------------------------------------
CONFIG_TIMING_FUNCTIONS=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# ---- Logging --------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# ---- C library ------------------------------------------------------------
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=n
